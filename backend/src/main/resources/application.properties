spring.application.name=opinion-analysis

# 数据库连接配置
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:3306/${DB_NAME:standardized_data}?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:spark}
spring.datasource.password=${DB_PASSWORD:your_db_password}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Redis缓存配置
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=6379
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=0
spring.redis.timeout=6000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

# JPA 配置
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# CORS 配置
app.cors.origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176

# 服务器配置
server.port=8080