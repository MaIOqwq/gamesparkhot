# 应用配置文件

# Kafka配置
kafka {
  bootstrap.servers = "${KAFKA_BOOTSTRAP_SERVERS}"
  bili {
    topics = ["bilibili_video", "bilibili_comment"]
    group.id = "bili-cleaner-group"
  }
  nga {
    context {
      topics = ["nga_context"]
      group.id = "nga-context-cleaner-group"
    }
    comment {
      topics = ["nga_comment"]
      group.id = "nga-comment-cleaner-group"
    }
  }
  consumer {
    auto.offset.reset = "latest"
    enable.auto.commit = false
  }
  
  # 统一Kafka主题配置
  unified {
    topic = "crawler_data"
    group.id = "unified-cleaner-group"
  }
}

# MariaDB配置
mysql {
  url = "${MYSQL_URL}"
  user = "${MYSQL_USER}"
  password = "${MYSQL_PASSWORD}"
  standardized {
    database = "standardized_data"
    fullUrl = "${MYSQL_FULL_URL}"
    table = "standardized_data"
  }
  
  # 数据库连接池配置
  pool {
    maxConnections = 10
    connectionTimeout = 30
  }
  
  # 批量写入配置
  batch {
    size = 1000
  }
  
  # 重试配置
  retry {
    times = 3
  }
}

# Spark配置
spark {
  appName = "DataCleaner"
  master = "local[*]"
  executor {
    memory = "2g"
    cores = 2
  }
  driver {
    memory = "1g"
  }
  streaming {
    batchDuration = 5
    checkpointDir = "/tmp/spark-checkpoints"
  }
}

# 日志配置
log {
  level = "INFO"
  pattern = "%d{yyyy-MM-dd HH:mm:ss} [%t] %-5p %c{1}:%L - %m%n"
}

# 归一化配置
norm {
  config {
    path = "src/main/resources/norm_config.json"
  }
}
